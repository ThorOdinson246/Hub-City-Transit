<div class="flex items-center justify-between px-6 h-16 w-full">
<button class="text-slate-900 dark:text-slate-50 hover:bg-slate-200/50 dark:hover:bg-slate-800/50 transition-colors active:scale-95 duration-150 p-2 rounded-full flex items-center justify-center">

</button>
<h1 class="font-['Plus_Jakarta_Sans'] font-bold text-lg tracking-tight text-xl font-extrabold text-slate-900 dark:text-slate-50 tracking-tighter">

<button class="hover:bg-slate-200/50 dark:hover:bg-slate-800/50 transition-colors active:scale-95 duration-150 rounded-full h-8 w-8 overflow-hidden bg-surface-variant flex items-center justify-center">

</div>

<div class="absolute inset-0 bg-gradient-to-b from-white/40 to-transparent"></div>
</div>

<!-- Bus 1 -->
<div class="absolute top-[40%] left-[30%] z-10 flex flex-col items-center">
<div class="bg-secondary text-on-secondary px-2 py-1 rounded-lg shadow-md flex items-center gap-1 mb-1 backdrop-blur-sm bg-opacity-90">
<span class="font-label-sm text-label-sm">RTE 4</span>
</div>
<div class="w-8 h-8 rounded-full bg-surface border-2 border-secondary shadow-lg flex items-center justify-center relative overflow-hidden">
<div class="absolute inset-0 bg-secondary/10"></div>
<span class="material-symbols-outlined text-[18px] text-secondary fill" data-icon="directions_bus">directions_bus</span>
<!-- Direction Indicator -->
<div class="absolute -top-1 -right-1 w-3 h-3 bg-secondary rounded-full border border-surface flex items-center justify-center rotate-45">
<span class="material-symbols-outlined text-[10px] text-on-secondary font-bold" data-icon="arrow_upward">arrow_upward</span>
</div>
</div>
</div>
<!-- Bus 2 -->
<div class="absolute top-[60%] right-[25%] z-10 flex flex-col items-center">
<div class="bg-primary text-on-primary px-2 py-1 rounded-lg shadow-md flex items-center gap-1 mb-1 backdrop-blur-sm bg-opacity-90">
<span class="font-label-sm text-label-sm">RTE 12</span>
</div>
<div class="w-8 h-8 rounded-full bg-surface border-2 border-primary shadow-lg flex items-center justify-center relative overflow-hidden">
<div class="absolute inset-0 bg-primary/10"></div>
<span class="material-symbols-outlined text-[18px] text-primary fill" data-icon="directions_bus">directions_bus</span>
</div>
</div>

<div class="absolute top-[50%] left-[50%] z-10 transform -translate-x-1/2 -translate-y-1/2">
<div class="w-6 h-6 rounded-full bg-secondary/20 flex items-center justify-center animate-pulse">
<div class="w-3 h-3 rounded-full bg-secondary border-2 border-white shadow-sm"></div>
</div>
</div>

<button class="flex items-center gap-3 group">
<span class="bg-surface text-on-surface font-label-lg text-label-lg px-3 py-1.5 rounded-lg shadow-sm opacity-90 group-hover:opacity-100 transition-opacity">Show All Routes</span>
<div class="w-10 h-10 rounded-full bg-surface text-on-surface shadow-md flex items-center justify-center hover:bg-surface-variant transition-colors">

</div>
</button>
<!-- Option 2 -->
<button class="flex items-center gap-3 group">
<span class="bg-surface text-on-surface font-label-lg text-label-lg px-3 py-1.5 rounded-lg shadow-sm opacity-90 group-hover:opacity-100 transition-opacity">Nearby Stops</span>
<div class="w-10 h-10 rounded-full bg-surface text-on-surface shadow-md flex items-center justify-center hover:bg-surface-variant transition-colors">
<span class="material-symbols-outlined" data-icon="location_on">location_on</span>
</div>
</button>
<!-- Option 3 -->
<button class="flex items-center gap-3 group">
<span class="bg-surface text-on-surface font-label-lg text-label-lg px-3 py-1.5 rounded-lg shadow-sm opacity-90 group-hover:opacity-100 transition-opacity">Search Route</span>
<div class="w-10 h-10 rounded-full bg-surface text-on-surface shadow-md flex items-center justify-center hover:bg-surface-variant transition-colors">
<span class="material-symbols-outlined" data-icon="search">search</span>
</div>
</button>
</div>

<!-- Map (Active) -->
<button class="flex flex-col items-center justify-center bg-slate-900 dark:bg-slate-100 text-white dark:text-slate-900 rounded-full px-5 py-1.5 hover:text-slate-800 dark:hover:text-slate-200 active:scale-90 transition-transform duration-200">

<span class="font-['Plus_Jakarta_Sans'] font-medium text-[11px] mt-1">Routes</span>
