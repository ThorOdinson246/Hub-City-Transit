<style>
        .material-symbols-outlined {
            font-family: 'Material Symbols Outlined';
            font-weight: normal;
            font-style: normal;
            font-size: 24px;
            line-height: 1;
            letter-spacing: normal;
            text-transform: none;
            display: inline-block;
            white-space: nowrap;
            word-wrap: normal;
            direction: ltr;
            -webkit-font-feature-settings: 'liga';
            -webkit-font-smoothing: antialiased;
        }
        
        .shimmer {
            background: linear-gradient(90deg, rgba(227,226,230,0) 0%, rgba(227,226,230,0.5) 50%, rgba(227,226,230,0) 100%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite linear;
        }
        
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        
        .pulse-transit {
            animation: pulse-transit 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        
        @keyframes pulse-transit {
            0%, 100% { opacity: 1; }
            50% { opacity: .5; }
        }
    </style>

<body class="h-full bg-surface text-on-surface flex flex-col items-center justify-center relative overflow-hidden">
<!-- Abstract Background Pattern -->
<div class="absolute inset-0 z-0 opacity-5 pointer-events-none" style="background-image: radial-gradient(circle at 2px 2px, #000101 1px, transparent 0); background-size: 32px 32px;">
</div>
<!-- Center Content Canvas -->
<main class="w-full max-w-md mx-auto px-margin-horizontal flex flex-col items-center justify-center flex-1 z-10 relative">
<!-- Logo and Branding Anchor -->
<div class="flex flex-col items-center space-y-stack-spacing-md mb-stack-spacing-lg">
<!-- Graphic Element: Transit Node -->
<div class="relative w-32 h-32 flex items-center justify-center rounded-full bg-surface-container-low shadow-[0_8px_32px_rgba(0,0,0,0.08)]">
<!-- Inner accent ring -->
<div class="absolute inset-2 rounded-full border-4 border-surface-container-high"></div>
<!-- Core Brand Icon -->
<div class="w-16 h-16 rounded-full bg-primary flex items-center justify-center shadow-[0_4px_16px_rgba(0,1,1,0.2)] z-10">
<span class="material-symbols-outlined text-on-primary text-[32px]" data-icon="directions_bus" data-weight="fill" style="font-variation-settings: 'FILL' 1;">directions_bus</span>
</div>
<!-- Subtle transit lines extending outward -->
<div class="absolute w-full h-[2px] bg-gradient-to-r from-transparent via-primary-fixed-dim to-transparent top-1/2 -translate-y-1/2 -z-10 pulse-transit"></div>
<div class="absolute h-full w-[2px] bg-gradient-to-b from-transparent via-primary-fixed-dim to-transparent left-1/2 -translate-x-1/2 -z-10 pulse-transit" style="animation-delay: 0.5s;"></div>
</div>
<!-- Typography Header -->
<div class="text-center space-y-stack-spacing-sm">
<h1 class="font-display-lg text-display-lg text-primary tracking-tight">Hub City Transit</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant max-w-[280px] mx-auto">Connecting the city, efficiently.</p>
</div>
</div>
<!-- Loading State Area -->
<div class="w-full flex flex-col items-center mt-stack-spacing-lg space-y-stack-spacing-md">
<!-- Status Text -->
<p class="font-label-lg text-label-lg text-on-surface-variant uppercase tracking-wider">Initializing System...</p>
<!-- Custom Progress Indicator (Civic Modernism Style) -->
<div class="w-48 h-1.5 bg-surface-container-highest rounded-full overflow-hidden relative">
<!-- Shimmer highlight moving across -->
<div class="absolute inset-0 w-full h-full shimmer"></div>
<!-- Progress bar filling -->
<div class="absolute left-0 top-0 h-full w-2/3 bg-primary rounded-full"></div>
</div>
<!-- Skeleton items mimicking incoming data -->
<div class="w-full flex justify-center space-x-4 mt-stack-spacing-sm opacity-50">
<div class="w-2 h-2 rounded-full bg-primary-fixed-dim shimmer" style="animation-delay: 0s;"></div>
<div class="w-2 h-2 rounded-full bg-primary-fixed-dim shimmer" style="animation-delay: 0.2s;"></div>
<div class="w-2 h-2 rounded-full bg-primary-fixed-dim shimmer" style="animation-delay: 0.4s;"></div>
</div>
</div>
</main>
<!-- Version/Footer Info -->
<div class="absolute bottom-stack-spacing-md left-0 w-full text-center z-10">
<p class="font-label-sm text-label-sm text-outline">v2.4.0 (Build 891)</p>
</div>
