        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    body {
      min-height: max(884px, 100dvh);

<body class="bg-background text-on-background font-body-md antialiased pb-32">
<!-- TopAppBar -->
<header class="bg-slate-50 dark:bg-zinc-900 text-zinc-900 dark:text-slate-50 font-['Plus_Jakarta_Sans'] font-bold tracking-tight docked full-width top-0 sticky border-b border-zinc-200 dark:border-zinc-800 shadow-sm flex justify-between items-center w-full px-6 h-16 z-40">
<button class="hover:bg-zinc-100 dark:hover:bg-zinc-800 transition-colors active:opacity-70 transition-opacity p-2 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined">directions_bus</span>
</button>
<h1 class="text-lg font-extrabold text-zinc-900 dark:text-white">Hub City Transit</h1>
<button class="hover:bg-zinc-100 dark:hover:bg-zinc-800 transition-colors active:opacity-70 transition-opacity p-2 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined">account_circle</span>
</button>
</header>
<main class="max-w-3xl mx-auto mt-6">
<!-- Header & Context -->
<section class="px-margin-horizontal mb-stack-spacing-md">
<h2 class="font-headline-lg text-headline-lg mb-2">Schedule</h2>
<div class="flex items-center gap-2 text-route-green">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">route</span>
<span class="font-title-lg text-title-lg">Green Route</span>
<span class="text-on-surface-variant font-body-md text-body-md ml-2">• Inbound</span>
</div>
</section>
<!-- Search & Filters -->
<section class="px-margin-horizontal mb-stack-spacing-lg">
<div class="bg-surface-variant/40 rounded-t-[16px] border-b border-outline mb-4 flex items-center px-4 py-3">
<span class="material-symbols-outlined text-on-surface-variant mr-3">search</span>
<input class="bg-transparent border-none p-0 w-full font-body-lg text-body-lg text-on-surface placeholder-on-surface-variant focus:ring-0" placeholder="Search for a stop..." type="text"/>
</div>
<div class="flex gap-2 overflow-x-auto hide-scrollbar pb-2">
<button class="shrink-0 flex items-center gap-2 px-4 py-2 bg-surface border border-outline-variant rounded-lg font-label-lg text-label-lg text-on-surface hover:bg-surface-variant transition-colors">
<span class="material-symbols-outlined text-[18px]">swap_horiz</span>
                    Transfers Only
                </button>
<button class="shrink-0 flex items-center gap-2 px-4 py-2 bg-secondary-container text-on-secondary-container border border-secondary/20 rounded-lg font-label-lg text-label-lg transition-colors">
<span class="material-symbols-outlined text-[18px]">bolt</span>
                    Live Adjusted
                </button>
</div>
</section>
<!-- Schedule List -->
<section class="px-margin-horizontal relative">
<!-- Continuous Route Line -->
<div class="absolute left-[38px] top-6 bottom-12 w-1 bg-surface-variant rounded-full z-0"></div>
<!-- Past Stop -->
<div class="relative pl-10 mb-stack-spacing-md flex items-start group opacity-60">
<div class="absolute left-[8px] top-4 w-3 h-3 rounded-full bg-outline-variant z-10 ring-4 ring-background"></div>
<div class="flex-1 bg-surface rounded-xl border border-outline-variant overflow-hidden flex shadow-sm">
<div class="w-[6px] bg-outline-variant shrink-0"></div>
<div class="p-4 flex-1 flex justify-between items-center">
<div>
<h3 class="font-label-lg text-label-lg text-on-surface">Uptown Station</h3>
<p class="font-body-md text-body-md text-on-surface-variant">Stop ID: 8122</p>
</div>
<div class="text-right">
<p class="font-label-lg text-label-lg text-on-surface-variant line-through">10:15 AM</p>
</div>
</div>
</div>
</div>
<!-- Current/Live Stop -->
<div class="relative pl-10 mb-stack-spacing-md flex items-start">
<div class="absolute left-[4px] top-3 w-5 h-5 rounded-full bg-primary-container z-10 flex items-center justify-center ring-4 ring-background">
<div class="w-2.5 h-2.5 rounded-full bg-route-green animate-pulse"></div>
</div>
<div class="flex-1 bg-primary-container/5 rounded-xl border border-primary/20 overflow-hidden flex shadow-[0_4px_12px_rgba(0,0,0,0.08)]">
<div class="w-[6px] bg-route-green shrink-0"></div>
<div class="p-4 flex-1">
<div class="flex justify-between items-start mb-2">
<div>
<h3 class="font-title-lg text-title-lg text-on-surface">Midtown Stop 28th St</h3>
<p class="font-body-md text-body-md text-on-surface-variant">Stop ID: 8124</p>
</div>
<div class="bg-secondary-container text-on-secondary-container px-2 py-1 rounded text-[10px] font-bold tracking-wider uppercase flex items-center gap-1">
<span class="material-symbols-outlined text-[14px]">sensors</span> Live
                            </div>
</div>
<div class="flex justify-between items-end mt-4">
<div class="flex gap-2">
<span class="px-2 py-1 bg-route-gold/10 text-route-gold border border-route-gold/20 rounded text-[10px] font-bold">GOLD</span>
<span class="px-2 py-1 bg-route-red/10 text-route-red border border-route-red/20 rounded text-[10px] font-bold">RED</span>
</div>
<div class="text-right">
<p class="font-headline-md text-headline-md text-primary leading-none">10:22 AM</p>
<p class="font-body-md text-body-md text-on-surface-variant">On time</p>
</div>
</div>
</div>
</div>
</div>
<!-- Future Stop -->
<div class="relative pl-10 mb-stack-spacing-md flex items-start">
<div class="absolute left-[8px] top-4 w-3 h-3 rounded-full bg-surface border-2 border-outline z-10 ring-4 ring-background"></div>
<div class="flex-1 bg-surface rounded-xl border border-outline-variant overflow-hidden flex shadow-sm">
<div class="w-[6px] bg-route-green shrink-0"></div>
<div class="p-4 flex-1 flex justify-between items-center">
<div>
<h3 class="font-label-lg text-label-lg text-on-surface">Downtown Central</h3>
<p class="font-body-md text-body-md text-on-surface-variant">Stop ID: 8128</p>
</div>
<div class="text-right">
<p class="font-label-lg text-label-lg text-on-surface">10:35 AM</p>
<p class="font-body-md text-body-md text-on-surface-variant line-through text-[12px]">10:30 AM</p>
</div>
</div>
</div>
</div>
<!-- Future Stop -->
<div class="relative pl-10 mb-stack-spacing-md flex items-start">
<div class="absolute left-[8px] top-4 w-3 h-3 rounded-full bg-surface border-2 border-outline z-10 ring-4 ring-background"></div>
<div class="flex-1 bg-surface rounded-xl border border-outline-variant overflow-hidden flex shadow-sm">
<div class="w-[6px] bg-route-green shrink-0"></div>
<div class="p-4 flex-1 flex justify-between items-center">
<div>
<h3 class="font-label-lg text-label-lg text-on-surface">Riverfront Park</h3>
<p class="font-body-md text-body-md text-on-surface-variant">Stop ID: 8130</p>
</div>
<div class="text-right">
<p class="font-label-lg text-label-lg text-on-surface">10:48 AM</p>
</div>
</div>
</div>
</div>
</section>
</main>

<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pt-3 pb-8 bg-white/90 dark:bg-zinc-900/95 backdrop-blur-md border-t border-zinc-100 dark:border-zinc-800 shadow-[0_-4px_12px_rgba(0,0,0,0.05)] rounded-t-2xl md:hidden font-['Plus_Jakarta_Sans'] text-[12px] font-semibold text-zinc-900 dark:text-slate-50">

<span class="material-symbols-outlined mb-1">map</span>
            Map

<span class="material-symbols-outlined mb-1" style="font-variation-settings: 'FILL' 1;">calendar_today</span>
            Schedule
        </button>
<button class="flex flex-col items-center justify-center text-zinc-500 dark:text-zinc-400 hover:text-zinc-900 dark:hover:text-zinc-100 hover:bg-zinc-50 dark:hover:bg-zinc-800 rounded-2xl active:scale-95 duration-200 ease-out p-2">
<span class="material-symbols-outlined mb-1">info</span>

        </button>
<button class="flex flex-col items-center justify-center text-zinc-500 dark:text-zinc-400 hover:text-zinc-900 dark:hover:text-zinc-100 hover:bg-zinc-50 dark:hover:bg-zinc-800 rounded-2xl active:scale-95 duration-200 ease-out p-2">
<span class="material-symbols-outlined mb-1">settings</span>
